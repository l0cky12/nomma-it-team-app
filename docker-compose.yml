version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npm run db:generate && npm run db:migrate && npm run db:seed && npm run start"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nomma
      POSTGRES_PASSWORD: nomma
      POSTGRES_DB: nomma_it
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomma -d nomma_it"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
